name: Docker Hub Overview

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dockerhub-overview
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ github.repository == 'zhiyingzzhou/renewlet' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 24

      - name: Generate Docker Hub overview
        # Docker Hub Overview 是仓库元数据，不跟随 image push；手动修复也必须复用发布时的绝对链接产物。
        run: node scripts/dockerhub-overview.mjs --ref "${GITHUB_SHA}" --output tmp/dockerhub/README.md --check

      - name: Update Docker Hub overview
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: zhiyingzzhou/renewlet
          short-description: Self-hosted subscription ledger and renewal reminders
          readme-filepath: ./tmp/dockerhub/README.md
