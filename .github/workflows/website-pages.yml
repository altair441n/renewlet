name: Website Pages

# 官网是独立静态站点，只发布 apps/website/dist，不触发 Renewlet 产品镜像或 Worker 部署。
on:
  push:
    branches:
      - main
    paths:
      - "apps/website/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/website-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: website-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        env:
          GITHUB_PAGES: "true"
        run: pnpm --filter @renewlet/website build

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: apps/website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
