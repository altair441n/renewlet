server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # 资源文件名由 Vite/脚本控制版本，长缓存只给 assets，不能套到 index.html。
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # 官网是单页静态站，深链刷新必须回落到入口 HTML。
  location / {
    try_files $uri $uri/ /index.html;
  }
}
